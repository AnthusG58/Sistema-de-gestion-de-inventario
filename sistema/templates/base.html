<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Mi Sistema{% endblock %}</title>
    
    <link href="/static/css/style.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased flex h-screen overflow-hidden" x-data="{ sidebarOpen: true }">

    <aside :class="sidebarOpen ? 'w-64' : 'w-20'" class="bg-gray-900 text-white flex flex-col transition-all duration-300 h-full shadow-2xl relative z-10">
        
        <div class="h-16 flex items-center justify-between px-4 bg-gray-950 border-b border-gray-800">
            <span x-show="sidebarOpen" class="text-xl font-bold tracking-wider text-blue-400">SISTEMA DE PREDICCIÓN</span>
            <button @click="sidebarOpen = !sidebarOpen" class="p-2 rounded-md hover:bg-gray-800 focus:outline-none text-gray-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>

        <nav class="flex-1 px-3 py-6 space-y-2 overflow-y-auto">
            <a href="/" class="flex items-center px-3 py-2.5 text-gray-300 hover:bg-blue-600 hover:text-white rounded-lg transition-colors group">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                <span x-show="sidebarOpen" class="ml-3 font-medium">Productos</span>
            </a>

            <a href="/ia" class="flex items-center px-3 py-2.5 text-gray-300 hover:bg-blue-600 hover:text-white rounded-lg transition-colors group">
                <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span x-show="sidebarOpen" class="ml-3 font-medium">Asistente IA</span>
            </a>
        

        </nav>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-gray-50">
        
        <header class="h-16 bg-white shadow-sm flex items-center px-8 border-b border-gray-200">
            <h2 class="text-xl font-semibold text-gray-800">{% block cabecera %}Panel de Control{% endblock %}</h2>
        </header>

        <div class="p-8">
            {% block contenido %}
            {% endblock %}
        </div>

    </main>

</body>
</html>
